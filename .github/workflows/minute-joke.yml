name: Minute Joke

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  joke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create joke issue
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Create a GitHub issue in this repository with:
            - Title: "Hello World - <current UTC timestamp>"
            - A short joke about Italy
            - The current UTC timestamp in the body
            - Label: "test-message"

            Use the gh CLI to create the issue. First ensure the label "test-message" exists (create it if not).
            Example: gh label create test-message --force && gh issue create --title "..." --body "..." --label test-message
          claude_args: "--max-turns 3"
          settings: |
            {
              "env": {
                "ANTHROPIC_BASE_URL": "${{ secrets.ANTHROPIC_BASE_URL }}"
              }
            }
